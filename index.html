<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulater</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="/css/style.css">
</head>


<body>
        <div class="kalkulater-container">
            <div id="display-output">PLACEHOLDERPLACEHOLDER</div>

            
            <div id="buttons-container">

                <div id="button-nums">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button id= "zero-button">0</button>
                <button>.</button>
                </div>

        
                <div id="button-operators">
                <button>Undo</button>
                <button>Clear</button>
                <button>%</button>
                <button>X</button>
                <button>-</button>
                <button>+</button>
                <button id="equals-button">=</button>
                </div>

            </div>

            </div>

        </div>

</body>


</html>
